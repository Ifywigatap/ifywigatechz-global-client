name: CD - Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Navigate to your project directory on the VPS
            # Replace /path/to/ifywigatechz-site with the actual path on your server
            cd /path/to/ifywigatechz-site
            
            # Ensure script is executable and run it
            chmod +x DEPLOY_VPS.sh
            ./DEPLOY_VPS.sh