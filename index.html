<!doctype html>
<html lang="en-NG">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0"
    />

    <!-- Primary Meta -->
    <title>IFYWIGATECHZ GLOBAL SERVICES — Portfolio</title>
    <meta
      name="description"
      content="Full-stack developer, UI/UX designer, tech educator & digital consultant. Explore the portfolio, projects, academy, and services of IFYWIGATECHZ Global Services."
    />
    <meta
      name="keywords"
      content="IFYWIGATECHZ, Full Stack Developer, UI UX Designer, MERN Stack, Web Development, Nigeria Tech, Digital Consultant, Ify Wigatechz Academy"
    />
    <meta name="author" content="IFYWIGATECHZ GLOBAL SERVICES" />
    <meta name="theme-color" content="#2D7FBF" />

    <!-- Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="apple-mobile-web-app-title"
      content="IFYWIGATECHZ"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="IFYWIGATECHZ GLOBAL SERVICES — Portfolio"
    />
    <meta
      property="og:description"
      content="Web development, UI/UX design, tech education, and digital consulting services."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="IFYWIGATECHZ GLOBAL SERVICES" />
    <meta property="og:image" content="/Ifyglobal.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="IFYWIGATECHZ GLOBAL SERVICES — Portfolio"
    />
    <meta
      name="twitter:description"
      content="Full-stack developer, UI/UX designer, and tech educator."
    />
    <meta name="twitter:image" content="/Ifyglobal.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favlogo.png" />
    <link rel="apple-touch-icon" href="/Ifyglobal.png" />
    <link rel="preload" as="image" href="/Ifyglobal.png" />

    <!-- Performance: Critical resources first -->
    <link rel="preconnect" href="https://js.paystack.co" crossorigin />
    <link rel="dns-prefetch" href="//www.youtube.com" />
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />

    <!-- Paystack -->
    <script
      src="https://js.paystack.co/v1/inline.js"
      defer
    ></script>

    <!-- Global Loader Styles -->
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
          Arial, sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }

      body.dark {
        background-color: #020617;
        color: #f5f5f5;
      }

      /* Splash Screen */
      .app-loader-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100%;
        text-align: center;
        padding: 20px;
      }

      .app-loader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        margin-bottom: 16px;
        animation: pulse 2s infinite ease-in-out;
      }

      .app-loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top: 3px solid #2d7fbf;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      @media (min-width: 640px) {
        .app-loader-logo {
          width: 110px;
          height: 110px;
          margin-bottom: 24px;
        }

        .app-loader-spinner {
          width: 50px;
          height: 50px;
          border: 4px solid rgba(0, 0, 0, 0.1);
          border-top: 4px solid #2d7fbf;
          margin-bottom: 24px;
        }
      }

      @media (min-width: 1024px) {
        .app-loader-logo {
          width: 140px;
          height: 140px;
          margin-bottom: 32px;
        }

        .app-loader-spinner {
          width: 60px;
          height: 60px;
          border: 4px solid rgba(0, 0, 0, 0.1);
          border-top: 4px solid #2d7fbf;
          margin-bottom: 32px;
        }
      }

      @media (orientation: landscape) and (max-height: 500px) {
        .app-loader-logo {
          width: 60px;
          height: 60px;
          margin-bottom: 12px;
        }

        .app-loader-spinner {
          width: 35px;
          height: 35px;
          margin-bottom: 12px;
        }

        .app-loader-title {
          font-size: 1.1rem;
        }

        .app-loader-text {
          font-size: 0.85rem;
        }
      }

      body.dark .app-loader-spinner {
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #2d7fbf;
      }

      .app-loader-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin: 0;
        line-height: 1.3;
      }

      .app-loader-text {
        margin-top: 8px;
        font-size: 0.95rem;
        opacity: 0.8;
        line-height: 1.4;
      }

      @media (min-width: 640px) {
        .app-loader-title {
          font-size: 1.5rem;
        }

        .app-loader-text {
          font-size: 1rem;
          margin-top: 12px;
        }
      }

      @media (min-width: 1024px) {
        .app-loader-title {
          font-size: 1.75rem;
        }

        .app-loader-text {
          font-size: 1.1rem;
          margin-top: 16px;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.9;
        }
      }
    </style>

    <!-- Dynamic About Page SEO -->
    <script>
      (() => {
        const isAboutPage =
          window.location.pathname === "/about";

        if (isAboutPage) {
          document.title =
            "About IFYWIGATECHZ | Ify Wigatechz - Tech Empowering Africa";

          const metaDescription =
            document.querySelector(
              'meta[name="description"]'
            );

          if (metaDescription) {
            metaDescription.setAttribute(
              "content",
              "Ifeanyichukwu Oko Isu (Ify Wigatechz) – Full-Stack Developer, UI/UX Designer, Academy Founder. Building digital solutions and training future African tech leaders."
            );
          }

          const ogTitle = document.querySelector(
            'meta[property="og:title"]'
          );

          if (ogTitle) {
            ogTitle.setAttribute(
              "content",
              document.title
            );
          }

          // Structured Data
          const schemaScript =
            document.createElement("script");

          schemaScript.type =
            "application/ld+json";

          schemaScript.text = JSON.stringify({
            "@context": "https://schema.org",
            "@type": "Person",
            name: "Ifeanyichukwu Oko Isu",
            alternateName: "Ify Wigatechz",
            jobTitle:
              "Full-Stack Developer & Digital Trainer",
            url: `${window.location.origin}/about`,
            image: `${window.location.origin}/Ifyglobal.png`,
            sameAs: [
              "https://linkedin.com/in/ifywigatechz",
            ],
          });

          document.head.appendChild(schemaScript);
        }

      })();
    </script>
  </head>

  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-neutral-100 transition-colors duration-300">
    <!-- React App Root -->
    <div id="root">
      <!-- Splash Screen -->
      <div class="app-loader-container">
        <img
          src="/Ifyglobal.png"
          alt="IFYWIGATECHZ Logo"
          class="app-loader-logo"
          loading="eager"
          decoding="sync"
        />

        <div class="app-loader-spinner"></div>

        <h1 class="app-loader-title">
          IFYWIGATECHZ GLOBAL SERVICES
        </h1>

        <p class="app-loader-text">
          Loading application...
        </p>
      </div>
    </div>

    <!-- Main Entry -->
     <!-- Example for a Vite project's index.html -->
<script type="module" src="/src/main.jsx"></script>
  </body>
</html>
